{{- if .Values.connector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bytefreezer.connector.fullname" . }}
  labels:
    {{- include "bytefreezer.connector.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: info

    server:
      port: {{ .Values.connector.service.apiPort }}

    control:
      url: {{ .Values.controlService.url | quote }}
      api_key: {{ .Values.controlService.apiKey | quote }}
      account_id: ""

    health_reporting:
      enabled: {{ .Values.connector.healthReporting.enabled }}
      report_interval: {{ .Values.connector.healthReporting.reportInterval }}

    query:
      tenant_id: ""
      dataset_id: ""
      sql: "SELECT * FROM read_parquet('PARQUET_PATH', hive_partitioning=true, union_by_name=true) LIMIT 100"

    destination:
      type: stdout
      config: {}

    cursor:
      file: /app/cursor.json

    schedule:
      interval_seconds: {{ .Values.connector.schedule.intervalSeconds }}
      batch_size: {{ .Values.connector.schedule.batchSize }}
{{- end }}
