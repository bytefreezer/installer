---
# ByteFreezer Connector Role

- name: Create connector directories
  file:
    path: "{{ bytefreezer_config_dir }}/connector"
    state: directory
    mode: '0755'

- name: Deploy connector configuration
  template:
    src: config.yaml.j2
    dest: "{{ bytefreezer_config_dir }}/connector/config.yaml"
    mode: '0600'
  notify: restart connector

- name: Deploy connector systemd service
  template:
    src: connector.service.j2
    dest: /etc/systemd/system/bytefreezer-connector.service
    mode: '0644'
  notify:
    - reload systemd
    - restart connector

- name: Pull connector image
  docker_image:
    name: "{{ image_registry }}/bytefreezer-connector:{{ image_tag }}"
    source: pull
    force_source: yes

- name: Start connector service
  systemd:
    name: bytefreezer-connector
    state: started
    enabled: yes
    daemon_reload: yes
